---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-victoria-logs
  namespace: openshift-ingress
spec:
  podSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: https-gateway-external
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress-logs
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: ingress-logs
              app.kubernetes.io/name: vlinsert
      ports:
        - protocol: TCP
          port: 9480
