---
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: istiod-openshift
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  background: false
  rules:
    - name: istiod-openshift-gateway
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - HorizontalPodAutoscaler
              names:
                - istiod-openshift-gateway
      mutate:
        patchStrategicMerge:
          spec:
            # Pinned to 3 control-plane nodes (see configmap deployment
            # override). minReplicas == nodes guarantees one Ready pod
            # per node, so the MetalLB L2 announcer node never ends up
            # with 0 local endpoints during scale-down/rollout.
            minReplicas: 3
