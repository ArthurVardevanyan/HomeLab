apiVersion: v1
kind: ConfigMap
metadata:
  name: coraza-rule-exclusions-internal-pre
  namespace: openshift-ingress
data:
  rules: |
    # -- Pre-CRS Rule Exclusions (Internal Gateway) --
    # All exclusions are scoped to a specific Host header so they cannot
    # leak to other vhosts behind the same gateway. The chained pattern is:
    #
    #   SecRule REQUEST_HEADERS:Host "@rx ^app\.example\.com(:|$)" \
    #       "id:NNNN,phase:1,pass,nolog,chain"
    #     SecRule REQUEST_URI "@beginsWith /path/" \
    #       "ctl:ruleRemoveById=XXXXX,..."
    #
    # @rx with (:|$) matches both bare hostname and Host: name:port form.

    # Vault — auth login endpoints (POST/PUT).
    # https://vault.arthurvardevanyan.com/v1/auth/\*
    SecRule REQUEST_HEADERS:Host "@rx ^vault\.arthurvardevanyan\.com(:|$)" "id:1100,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@beginsWith /v1/auth/" "ctl:ruleRemoveById=911100,ctl:ruleRemoveById=949111"

    # Nextcloud — WebDAV / OCS / Talk. Covers two distinct false-positive sources:
    #   1. Non-standard verbs (PROPFIND, MKCOL, MOVE, COPY, REPORT) → 911100
    #   2. Sync-client file uploads (PUT to /remote.php/dav/files/<user>/...
    #      and chunked uploads to /remote.php/dav/uploads/<user>/...) carry
    #      arbitrary binary content as application/octet-stream, tripping
    #      920420 (content-type), 920270 (null bytes), 920440 (extension),
    #      921150 (header injection on certain filenames), and 949111.
    #   3. Syncing source-tree working copies (e.g. .git/, .svn/, .htaccess
    #      under /remote.php/dav/files/<user>/Projects/...) trips 930120/930130
    #      (Restricted File Access).
    # Body inspection is disabled because the gateway cannot meaningfully
    # scan opaque user file contents.
    # https://files.arthurvardevanyan.com/remote.php/\*
    SecRule REQUEST_HEADERS:Host "@rx ^files\.arthurvardevanyan\.com(:|$)" "id:1101,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@beginsWith /remote.php/" "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920270,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=920440,ctl:ruleRemoveById=921150,ctl:ruleRemoveById=930120,ctl:ruleRemoveById=930130,ctl:ruleRemoveById=942100,ctl:ruleRemoveById=942190,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"

    # Nextcloud — OCS API. Browser/desktop clients PUT to OCS endpoints such
    # as /ocs/v2.php/apps/user_status/api/v1/heartbeat, which trips 911100
    # (PUT not in default method allow-list) → 949111 → 403.
    # https://files.arthurvardevanyan.com/ocs/\*
    SecRule REQUEST_HEADERS:Host "@rx ^files\.arthurvardevanyan\.com(:|$)" "id:1112,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@beginsWith /ocs/" "ctl:ruleRemoveById=911100,ctl:ruleRemoveById=949111"

    # Spotify analytics — disable body inspection for historical import
    # endpoints (files too large for WASM memory).
    # https://analytics-for-spotify.arthurvardevanyan.com/analytics/\*
    SecRule REQUEST_HEADERS:Host "@rx ^analytics-for-spotify\.arthurvardevanyan\.com(:|$)" "id:1102,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@rx ^/analytics/(analyzeHistoricalImport|importHistoricalData)/" "t:none,ctl:requestBodyAccess=Off"

    # MinIO (UNAS) — Velero / Kopia S3 backup bucket. Both kopia repository
    # paths (binary chunks via PUT/POST with application/x-kopia) and the
    # velero backups/ metadata (DELETE via x-id=DeleteObject) live under
    # /velero-backup/. Body inspection disabled for binary backup data.
    # https://s3.unas.arthurvardevanyan.com/velero-backup/\*
    # https://s3.ssd.unas.arthurvardevanyan.com/velero-backup/\*
    SecRule REQUEST_HEADERS:Host "@rx ^s3\.(ssd\.)?unas\.arthurvardevanyan\.com(:|$)" "id:1103,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@beginsWith /velero-backup/" "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920270,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=921150,ctl:ruleRemoveById=942100,ctl:ruleRemoveById=942190,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"

    # MinIO (UNAS) — Thanos / Prometheus long-term storage S3 bucket.
    # Same binary-chunk false positives as kopia.
    # https://s3.unas.arthurvardevanyan.com/prometheus-thanos/\*
    # https://s3.ssd.unas.arthurvardevanyan.com/prometheus-thanos/\*
    SecRule REQUEST_HEADERS:Host "@rx ^s3\.(ssd\.)?unas\.arthurvardevanyan\.com(:|$)" "id:1108,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@beginsWith /prometheus-thanos/" "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920270,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=921150,ctl:ruleRemoveById=942100,ctl:ruleRemoveById=942190,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"

    # MinIO (UNAS) — Nextcloud rclone backup. Bucket "nextcloud" contains
    # arbitrary user files (any content-type / extension) and bucket
    # "db-dump" carries Postgres dumps as application/x-sql with .sql keys
    # (trips 920420 + 920440 → 949111 → 403 Forbidden on PutObject).
    # https://s3.unas.arthurvardevanyan.com/nextcloud/\*
    # https://s3.unas.arthurvardevanyan.com/db-dump/\*
    # https://s3.ssd.unas.arthurvardevanyan.com/nextcloud/\*
    # https://s3.ssd.unas.arthurvardevanyan.com/db-dump/\*
    SecRule REQUEST_HEADERS:Host "@rx ^s3\.(ssd\.)?unas\.arthurvardevanyan\.com(:|$)" "id:1110,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@rx ^/(nextcloud|db-dump)/" "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920270,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=920440,ctl:ruleRemoveById=921150,ctl:ruleRemoveById=942100,ctl:ruleRemoveById=942190,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"

    # Gitea — smart-HTTP endpoints. ".git/" trips 930130 (LFI); upload-pack /
    # receive-pack POSTs use application/x-git-* binary content type.
    # https://git.arthurvardevanyan.com/\<owner\>/\<repo\>.git/info/refs
    # https://git.arthurvardevanyan.com/\<owner\>/\<repo\>/git-upload-pack
    # https://git.arthurvardevanyan.com/\<owner\>/\<repo\>/git-receive-pack
    SecRule REQUEST_HEADERS:Host "@rx ^git\.arthurvardevanyan\.com(:|$)" "id:1104,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@contains .git/info/refs" "ctl:ruleRemoveById=930130,ctl:ruleRemoveById=949111"
    SecRule REQUEST_HEADERS:Host "@rx ^git\.arthurvardevanyan\.com(:|$)" "id:1105,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@contains /git-upload-pack" "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=920450,ctl:ruleRemoveById=930130,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"
    SecRule REQUEST_HEADERS:Host "@rx ^git\.arthurvardevanyan\.com(:|$)" "id:1106,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@contains /git-receive-pack" "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=920450,ctl:ruleRemoveById=930130,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"

    # Quay — registry REST API uses PUT for resource creation
    # (e.g. /api/v1/organization/<org>/robots/<name>).
    # https://registry.arthurvardevanyan.com/api/v1/\*
    SecRule REQUEST_HEADERS:Host "@rx ^registry\.arthurvardevanyan\.com(:|$)" "id:1107,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@beginsWith /api/v1/" "ctl:ruleRemoveById=911100,ctl:ruleRemoveById=949111"

    # Quay — Docker Registry v2 write endpoints. Blob uploads carry binary
    # image layer chunks (PATCH/PUT application/octet-stream); manifest PUTs
    # use vendor content types like application/vnd.docker.distribution.manifest.v2+json
    # and application/vnd.oci.image.manifest.v1+json which trip 920420 and
    # 911100 (PUT not in default method allow-list).
    # https://registry.arthurvardevanyan.com/v2/\<repo\>/blobs/uploads/\*
    # https://registry.arthurvardevanyan.com/v2/\<repo\>/manifests/\*
    SecRule REQUEST_HEADERS:Host "@rx ^registry\.arthurvardevanyan\.com(:|$)" "id:1109,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@rx ^/v2/.+/(blobs/uploads|manifests)/" "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920270,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=921150,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"

    # Zitadel — gRPC API endpoints (Admin, Management, Auth, System,
    # User, Session, OIDC, SAML, Org services). gRPC uses
    # application/grpc / application/grpc+proto content types which are
    # not in the default 920420 allow-list (trips 920420 → 949111 → 403).
    # gRPC framing is binary, so request body inspection is also disabled.
    # Service paths are of the form /zitadel.<package>.v<N>.<Service>/<Method>
    # https://zitadel.arthurvardevanyan.com/zitadel.\*
    SecRule REQUEST_HEADERS:Host "@rx ^zitadel\.arthurvardevanyan\.com(:|$)" "id:1111,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@rx ^/zitadel\." "t:none,ctl:requestBodyAccess=Off,ctl:ruleRemoveById=911100,ctl:ruleRemoveById=920270,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=921150,ctl:ruleRemoveById=949110,ctl:ruleRemoveById=949111"

    # Argo CD — REST API uses PUT to update Application resources
    # (e.g. /api/v1/applications/<name>) and other CRUD endpoints. PUT is
    # not in the CRS default method allow-list, tripping 911100 → 949111.
    # https://argocd.okd.homelab.arthurvardevanyan.com/api/v1/\*
    SecRule REQUEST_HEADERS:Host "@rx ^argocd\.okd\.homelab\.arthurvardevanyan\.com(:|$)" "id:1113,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@beginsWith /api/v1/" "ctl:ruleRemoveById=911100,ctl:ruleRemoveById=949111"
