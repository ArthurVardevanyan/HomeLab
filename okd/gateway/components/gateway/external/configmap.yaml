########################################################################################################
### https://unifi.arthurvardevanyan.com/network/default/settings/policy-table?preset=port-forwarding ###
########################################################################################################
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gw-options-external
  namespace: openshift-ingress
data:
  service: |
    metadata:
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.101.10.241"
    spec:
      externalTrafficPolicy: Local
      internalTrafficPolicy: Cluster
      loadBalancerClass: metallb.io/metallb-class
  podDisruptionBudget: |
    spec:
      minAvailable: 1
  horizontalPodAutoscaler: |
    spec:
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 150
      # Slow scale-down so externalTrafficPolicy: Local + MetalLB + upstream
      # ARP / external health-probe have time to converge between events.
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120
          selectPolicy: Max
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 2
              periodSeconds: 30
          selectPolicy: Max
  deployment: |
    spec:
      # Cover preStop sleep (45s) + envoy drain.
      template:
        spec:
          terminationGracePeriodSeconds: 90
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  gateway.networking.k8s.io/gateway-name: https-gateway-external
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  gateway.networking.k8s.io/gateway-name: https-gateway-external
          containers:
            - name: istio-proxy
              # Keep envoy serving traffic while:
              #   * EndpointSlice marks this pod NotReady
              #   * MetalLB re-elects the L2 speaker for the LB IP
              #   * Upstream router (UniFi) refreshes its ARP cache
              #   * The external health probe re-targets a healthy node
              # Without this, externalTrafficPolicy: Local drops in-flight
              # traffic on the terminating node and the probe flaps.
              lifecycle:
                preStop:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - sleep 45
              resources:
                requests:
                  cpu: 100m
                  memory: 1Gi
                limits:
                  cpu: 300m
                  memory: 3Gi
