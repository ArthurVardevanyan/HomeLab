---
# https-gateway (internal) - has CPU HPA, so VPA memory only
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: https-gateway-openshift-default
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: https-gateway-openshift-default
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
      - containerName: istio-proxy
        minAllowed:
          memory: 512Mi
        maxAllowed:
          memory: 1Gi
        controlledResources:
          - memory
        controlledValues: RequestsAndLimits
