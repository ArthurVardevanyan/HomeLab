---
- name: Install and configure Microshift
  hosts: microshift
  gather_facts: false
  become: true
  user: arthur
  tasks:
    - name: CGroupsV2
      ansible.builtin.copy:
        src: "../../../../machineConfigs/servers/microshift/boot/cmdline.txt"
        dest: "/boot/cmdline.txt"
        mode: "0644"

    - name: CRI-O v1.35 repo
      ansible.builtin.yum_repository:
        name: cri-o
        description: CRI-O
        baseurl: https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.35/rpm/
        gpgcheck: true
        gpgkey: https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.35/rpm/repodata/repomd.xml.key
        enabled: true
        mode: "0644"

    - name: Kubernetes v1.35 repo
      ansible.builtin.yum_repository:
        name: kubernetes
        description: Kubernetes
        baseurl: https://pkgs.k8s.io/core:/stable:/v1.35/rpm/
        gpgcheck: true
        gpgkey: https://pkgs.k8s.io/core:/stable:/v1.35/rpm/repodata/repomd.xml.key
        enabled: true
        mode: "0644"

    - name: Install CRI-O packages
      ansible.builtin.dnf:
        state: latest
        name:
          # renovate: datasource=rpm depName=cri-o registryUrl=https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v1.35/rpm/
          - cri-o
          # renovate: datasource=rpm depName=cri-tools registryUrl=https://pkgs.k8s.io/core:/stable:/v1.35/rpm/
          - cri-tools
          # TODO: renovate: datasource=repology depName=centos_stream_9/containernetworking-plugins
          - containernetworking-plugins
      notify: Restart crio
    - name: Copy Pull Secret
      ansible.builtin.copy:
        src: "/tmp/pull_secret.json"
        dest: "/etc/crio/openshift-pull-secret"
        mode: "0600"
        owner: root
        group: root

    - name: Make sure cri-o service unit is running
      ansible.builtin.systemd:
        state: started
        enabled: true
        name: crio

    - name: MicroShift Dir
      ansible.builtin.file:
        path: "/etc/microshift"
        state: directory
        mode: "0755"

    - name: MicroShift Config Dir
      ansible.builtin.file:
        path: "/etc/microshift/config.d/"
        state: directory
        mode: "0755"

    - name: MicroShift HostName
      ansible.builtin.copy:
        src: "../../../../machineConfigs/servers/microshift/etc/microshift/config.d/10-subjectAltNames.yaml"
        dest: "/etc/microshift/config.d/10-subjectAltNames.yaml"
        mode: "0644"

    - name: MicroShift Gateway
      ansible.builtin.copy:
        src: "../../../../machineConfigs/servers/microshift/etc/microshift/ovn.yaml"
        dest: "/etc/microshift/ovn.yaml"
        mode: "0644"

    - name: Find MicroShift RPMs in /tmp
      ansible.builtin.find:
        paths: /tmp
        patterns: "microshift-*.rpm"
      register: microshift_rpms

    - name: Install MicroShift RPMs (built from source)
      ansible.builtin.dnf:
        state: present
        disable_gpg_check: true
        name: "{{ microshift_rpms.files | map(attribute='path') | list }}"
      when: microshift_rpms.matched > 0
      notify: Restart MicroShift

    - name: Remove stale ovn-k8s-cni-overlay binary
      ansible.builtin.file:
        path: /opt/cni/bin/ovn-k8s-cni-overlay
        state: absent
      when: microshift_rpms.matched > 0
      notify: Restart MicroShift

    - name: Firewalld pod network
      ansible.posix.firewalld:
        zone: trusted
        source: 10.42.0.0/16
        permanent: true
        state: enabled

    - name: Firewalld port 80
      ansible.posix.firewalld:
        zone: public
        port: 80/tcp
        permanent: true
        state: enabled

    - name: Firewalld port 443
      ansible.posix.firewalld:
        zone: public
        port: 443/tcp
        permanent: true
        state: enabled

    - name: Firewalld port 5353
      ansible.posix.firewalld:
        zone: public
        port: 5353/udp
        permanent: true
        state: enabled

    - name: Firewalld port 6443
      ansible.posix.firewalld:
        zone: public
        port: 6443/tcp
        permanent: true
        state: enabled

    - name: Firewalld nodeports
      ansible.posix.firewalld:
        zone: public
        port: 30000-32767/tcp
        permanent: true
        state: enabled

    - name: Make sure microshift service unit is running
      ansible.builtin.systemd:
        state: started
        enabled: true
        name: microshift

    - name: Create a directory /.kube if it does not exist
      ansible.builtin.file:
        path: /home/arthur/.kube/
        state: directory
        mode: "0755"
        owner: arthur
        group: arthur

    - name: Kubeconfig
      ansible.builtin.copy:
        src: "/var/lib/microshift/resources/kubeadmin/kubeconfig"
        dest: "/home/arthur/.kube/config"
        mode: "0600"
        remote_src: true
        owner: arthur
        group: arthur
      retries: 3
      delay: 3

  handlers:
    - name: Restart crio
      ansible.builtin.systemd:
        name: crio
        state: restarted

    - name: Restart MicroShift
      ansible.builtin.systemd:
        name: microshift
        state: restarted
