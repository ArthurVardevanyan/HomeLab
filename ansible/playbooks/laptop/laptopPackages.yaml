---
- name: Install Laptop Packages
  hosts: lenovo
  gather_facts: false
  become: true
  user: arthur
  tasks:
    - name: Upgrade all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest # noqa package-latest
    - name: Install core packages
      ansible.builtin.dnf:
        state: present
        name:
          # TODO: renovate: datasource=repology depName=fedora_44/openssh
          - openssh-server # -10.0p1-6.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/speedtest-cli
          - speedtest-cli # -2.1.3-16.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gnome-screenshot
          - gnome-screenshot # -41.0-12.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gnome-tweaks
          - gnome-tweaks # -46.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/thunderbird
          - thunderbird # -115.12.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/sshpass
          - sshpass # -1.10-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/htop
          - htop # -3.3.0-4.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/fastfetch
          - fastfetch # -2.42.2-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/nvtop
          - nvtop # -3.0.1-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/pv
          - pv # -1.8.5-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/jq
          - jq # -1.7.1-3.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/rsync
          - rsync # -3.2.7-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gparted
          - gparted # -1.5.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/smartmontools
          - smartmontools # -7.4-2.fc44
          # - caffeine
          # - p7zip
          # - remmina
    - name: Install development tools
      ansible.builtin.dnf:
        state: present
        name:
          # TODO: renovate: datasource=repology depName=fedora_44/gnupg2
          - gnupg2 # -2.4.4-2.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/git
          - git # -2.43.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gh
          - gh # -2.45.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/ansible
          - ansible # -9.2.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/make
          - make # -4.3-4.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gcc
          - gcc # -13.2.0-7.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gcc
          - gcc-c++ # -13.2.0-7.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/python-pip
          - python3-pip # -24.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/cockpit
          - cockpit # -313-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gdb
          - gdb # -15.0.50-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/android-tools
          - android-tools # -34.0.4-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/podman
          - podman # -4.9.3-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/buildah
          - buildah # -1.34.1-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/skopeo
          - skopeo # -1.14.2-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/tree-pkg
          - tree # -2.1.1-2.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/rust-bat
          - bat # -0.24.0-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/opentofu
          - opentofu # -1.7.2-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/nodejs
          - nodejs # -22.15.0-1.fc44
          # - arduino
    - name: Download YQ
      ansible.builtin.get_url:
        # TODO: renovate: datasource=github-releases depName=mikefarah/yq
        url: https://github.com/mikefarah/yq/releases/download/v4.44.2/yq_linux_arm64
        dest: /usr/local/bin/yq
        mode: "0755"

    - name: Install additional packages
      ansible.builtin.dnf:
        state: present
        name:
          # TODO: renovate: datasource=repology depName=fedora_44/vlc
          - vlc # -3.0.20-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/gimp
          - gimp # -2.10.36-3.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/obs-studio
          - obs-studio # -30.0.2-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/openscad
          - openscad # -2021.01-6.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/HandBrake
          - HandBrake-gui # -1.7.3-1.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/ffmpeg-free
          - ffmpeg-free # -8.0.1-6.fc44
          # TODO: renovate: datasource=repology depName=fedora_44/blender
          - blender # -4.0.2-1.fc44
    - name: Install pipx
      ansible.builtin.dnf:
        state: present
        name:
          # TODO: renovate: datasource=repology depName=fedora_44/python-pipx
          - pipx # -1.4.3-1.fc44
    - name: Install JC
      community.general.pipx:
        name: JC
        state: present
    - name: Install pre-commit
      community.general.pipx:
        name: pre-commit
        state: present
    - name: Install global npm packages
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: present
      loop:
        # renovate: datasource=npm depName=markdownlint-cli
        - markdownlint-cli
        # renovate: datasource=npm depName=prettier
        - prettier
