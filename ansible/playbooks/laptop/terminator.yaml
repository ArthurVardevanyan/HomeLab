---
- name: Install Terminator
  hosts: lenovo
  gather_facts: false
  user: arthur
  tasks:
    - name: Install Terminator
      become: true
      ansible.builtin.dnf:
        state: present
        name:
          # TODO: renovate: datasource=repology depName=fedora_44/terminator
          - terminator # -2.1.3-1.fc44

    - name: Copy Terminator Config
      ansible.builtin.copy:
        src: "../../../machineConfigs/desktop/home/arthur/.config/terminator"
        dest: "/home/arthur/.config/"
        mode: "0644"
