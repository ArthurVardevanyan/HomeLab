---
- name: Install Discord
  hosts: lenovo
  gather_facts: false
  user: arthur
  tasks:
    - name: Install WebCord RPM
      become: true
      ansible.builtin.dnf:
        state: present
        disable_gpg_check: true
        name:
          # renovate: datasource=github-releases depName=SpacingBat3/WebCord
          - https://github.com/SpacingBat3/WebCord/releases/download/v4.13.0/webcord-4.13.0-1.arm64.rpm
    - name: Discord Startup
      ansible.builtin.copy:
        src: "../../../machineConfigs/desktop/home/arthur/.config/autostart/discord-stable.desktop"
        dest: "/home/arthur/.config/autostart/discord-stable.desktop"
        mode: "0644"
