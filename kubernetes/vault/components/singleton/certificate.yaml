---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-okd-cert
  namespace: vault
  labels:
    app.kubernetes.io/instance: vault
spec:
  secretName: vault-okd-cert
  duration: 1080h # 45d
  renewBeforePercentage: 50
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256 # P-384 not supported by Envoy/OpenShift Ingress for re-encrypt (wrong_curve)
  dnsNames:
    - "vault.okd.homelab.arthurvardevanyan.com"
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt # cloud-dns-letsencrypts-letsencrypt
