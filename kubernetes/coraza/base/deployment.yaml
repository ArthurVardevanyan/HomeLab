---
# Source: coraza-kubernetes-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coraza-kubernetes-operator
  namespace: coraza-system
  labels:
    helm.sh/chart: coraza-kubernetes-operator-0.1.0
    app.kubernetes.io/name: coraza-kubernetes-operator
    app.kubernetes.io/instance: coraza-kubernetes-operator
    control-plane: coraza-controller-manager
    app.kubernetes.io/version: "0.2.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1 # HA Currently not working due to cache  being tied to leader election
  selector:
    matchLabels:
      app.kubernetes.io/name: coraza-kubernetes-operator
      app.kubernetes.io/instance: coraza-kubernetes-operator
      control-plane: coraza-controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: coraza-kubernetes-operator
        app.kubernetes.io/instance: coraza-kubernetes-operator
        control-plane: coraza-controller-manager
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: true
      enableServiceLinks: false
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: coraza-kubernetes-operator
          maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: coraza-kubernetes-operator
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
      containers:
        - name: manager
          image: "ghcr.io/networking-incubator/coraza-kubernetes-operator:latest"
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect=true
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8082
            - --metrics-secure=true
            - --envoy-cluster-name=outbound|80||coraza-kubernetes-operator.coraza-system.svc.cluster.local
            - --cache-gc-interval=3s
          securityContext:
            runAsNonRoot: true
            privileged: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - "ALL"
          startupProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            timeoutSeconds: 1
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          resources:
            limits:
              cpu: 30m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 128Mi
          resizePolicy:
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: NotRequired
      serviceAccountName: coraza-kubernetes-operator
      terminationGracePeriodSeconds: 10
