---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: uptime-cert
  namespace: uptime-kuma
spec:
  secretName: uptime-cert
  duration: 1080h # 45d
  renewBeforePercentage: 50
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256 # P-384 not supported by Envoy/OpenShift Ingress for re-encrypt (wrong_curve)
  dnsNames:
    - "uptime.arthurvardevanyan.com"
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
