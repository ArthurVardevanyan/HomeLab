---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-stackrox-dns
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/instance: stackrox-central-services
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: stackrox
  policyTypes:
    - Egress
  egress:
