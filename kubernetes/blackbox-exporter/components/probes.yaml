---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: website
  namespace: blackbox-exporter
spec:
  jobName: website
  interval: 60s
  scrapeTimeout: 5s
  module: http_2xx
  prober:
    path: /probe
    url: blackbox-exporter.blackbox-exporter.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://arthurvardevanyan.com
        - https://www.arthurvardevanyan.com
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: spotify
  namespace: blackbox-exporter
spec:
  jobName: spotify
  interval: 60s
  scrapeTimeout: 5s
  module: http_2xx
  prober:
    path: /probe
    url: blackbox-exporter.blackbox-exporter.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://spotify.arthurvardevanyan.com/health/
        - https://analytics-for-spotify.arthurvardevanyan.com/health/
