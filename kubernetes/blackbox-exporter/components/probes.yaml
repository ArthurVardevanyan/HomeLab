        - https://finance.arthurvardevanyan.com/
        - https://git.arthurvardevanyan.com/api/healthz
        - https://grafana.arthurvardevanyan.com/api/health
        - https://heimdall.arthurvardevanyan.com/
        - https://home.arthurvardevanyan.com/manifest.json
        - https://photos.arthurvardevanyan.com/api/server/ping
        - https://files.arthurvardevanyan.com/status.php
        - https://registry.arthurvardevanyan.com/health/instance
        - https://vault.arthurvardevanyan.com/v1/sys/health?standbyok=true&perfstandbyok=true
        - https://zitadel.arthurvardevanyan.com/debug/healthz
        - https://technitium.okd.homelab.arthurvardevanyan.com/
        # MinIO on NAS (HTTPRoute)
        - https://s3.unas.arthurvardevanyan.com/minio/health/live
        - https://console.s3.unas.arthurvardevanyan.com/
        - https://s3.ssd.unas.arthurvardevanyan.com/minio/health/live
