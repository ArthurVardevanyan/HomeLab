---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: urls-ingress
  namespace: blackbox-exporter
spec:
  jobName: url-ingress
  interval: 30s
  module: http_2xx
  prober:
    path: /probe
    url: blackbox-exporter.blackbox-exporter.svc.cluster.local:9115
  targets:
    ingress:
      namespaceSelector:
        any: true
      selector:
        matchExpressions:
          - key: blackbox
            operator: DoesNotExist
            values:
              - ignore
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: urls-static
  namespace: blackbox-exporter
spec:
  jobName: urls-static
  interval: 30s
  module: http_2xx
  prober:
    path: /probe
    url: blackbox-exporter.blackbox-exporter.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        # Public DNS sanity
        - https://1.1.1.1/
        - https://1.0.0.1/
        # OKD cluster
        - https://api.okd.homelab.arthurvardevanyan.com:6443/healthz
        - https://console-openshift-console.apps.okd.homelab.arthurvardevanyan.com
        # MicroShift / NAS
        - https://unifi.arthurvardevanyan.com/
        - https://unas.arthurvardevanyan.com/
        - https://console.minio.microshift.arthurvardevanyan.com/minio/health/live
        - https://minio.microshift.arthurvardevanyan.com/minio/health/live
        - http://metrics.microshift.arthurvardevanyan.com/health
        - https://registry.microshift.arthurvardevanyan.com/v2/
        - https://technitium.arthurvardevanyan.com/
        # HTTPRoute-backed internal apps (okd.homelab.arthurvardevanyan.com)
        - https://argocd.okd.homelab.arthurvardevanyan.com/healthz
        - https://argocd-apps.okd.homelab.arthurvardevanyan.com/healthz
        - https://ceph.okd.homelab.arthurvardevanyan.com/
        - https://central-stackrox.okd.homelab.arthurvardevanyan.com/v1/ping
        - https://kfca.okd.homelab.arthurvardevanyan.com/readyz
        - https://pgadmin.okd.homelab.arthurvardevanyan.com/misc/ping
        - https://prometheus.okd.homelab.arthurvardevanyan.com/-/healthy
        - https://prometheus-ceph.okd.homelab.arthurvardevanyan.com/-/healthy
        - https://prometheus-nas.okd.homelab.arthurvardevanyan.com/-/healthy
        - https://thanos-querier.okd.homelab.arthurvardevanyan.com/-/healthy
        - https://technitium.okd.homelab.arthurvardevanyan.com/
        # HTTPRoute-backed external apps (arthurvardevanyan.com)
