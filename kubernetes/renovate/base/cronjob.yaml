---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-bot
  namespace: renovate
spec:
  schedule: "0 12 1-7,15-21 * 6"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 12021
            fsGroup: 12021
          enableServiceLinks: false
          restartPolicy: Never
          dnsPolicy: ClusterFirst
          schedulerName: default-scheduler
          terminationGracePeriodSeconds: 300
          automountServiceAccountToken: false
          serviceAccountName: renovate
          # initContainers:
          #   - name: mod
          #     # renovate: datasource=docker depName=docker.io/renovate/renovate
          #     image: docker.io/renovate/renovate:42.64.1-full@sha256:f58d457847cbeae5000d00331cbcae9abf600e25a2f42fe6add9b5e38950e2ce
          #     command: ["touch", "/usr/local/bin/mod"]
          #     resources:
          #       limits:
          #         cpu: 50m
          #         ephemeral-storage: 64Mi
          #         memory: 64Mi
          #       requests:
          #         cpu: 25m
          #         ephemeral-storage: 32Mi
          #         memory: 32Mi
          #     securityContext:
          #       privileged: false
          #       runAsNonRoot: true
          #       readOnlyRootFilesystem: true
          #       allowPrivilegeEscalation: false
          #       seccompProfile:
          #         type: RuntimeDefault
          #       capabilities:
          #         drop:
          #           - ALL
          #     volumeMounts:
          #       - name: mod
          #         mountPath: "/usr/local/bin"
          initContainers:
            #  https://api.github.com/users/homelab-okd[bot]
            - name: github-app-token
              image: registry.arthurvardevanyan.com/homelab/toolbox:not_latest
              command: ["bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  APP_ID="$GITHUB_APP_ID"
                  INSTALL_ID="$GITHUB_APP_INSTALLATION_ID"

                  # Base64url encode (no padding)
                  b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }

                  # Build JWT header and payload
                  NOW=$(date +%s)
                  IAT=$((NOW - 60))
                  EXP=$((NOW + 600))
                  HEADER=$(echo -n '{"alg":"RS256","typ":"JWT"}' | b64url)
                  PAYLOAD=$(echo -n "{\"iat\":${IAT},\"exp\":${EXP},\"iss\":\"${APP_ID}\"}" | b64url)

                  # Sign and assemble JWT
                  SIGNATURE=$(echo -n "${HEADER}.${PAYLOAD}" | \
                    openssl dgst -sha256 -sign <(echo "$GITHUB_APP_KEY") -binary | b64url)
                  JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"

                  # Exchange JWT for installation access token
                  RESPONSE=$(curl -sf -X POST \
                    -H "Authorization: Bearer ${JWT}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/app/installations/${INSTALL_ID}/access_tokens")

                  echo "$RESPONSE" | jq -r '.token' > /tmp/token/token
              resources:
                limits:
                  cpu: 100m
                  ephemeral-storage: 64Mi
                  memory: 128Mi
                requests:
                  cpu: 50m
                  ephemeral-storage: 32Mi
                  memory: 64Mi
              securityContext:
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              envFrom:
                - secretRef:
                    name: renovate-env
              volumeMounts:
                - name: token
                  mountPath: /tmp/token
          containers:
            # renovate: datasource=docker depName=docker.io/renovate/renovate
            - image: docker.io/renovate/renovate:43.75.0-full@sha256:3a6ac6c4676a73ecce5cb834dc07faff4608a9ab501868e73692044c2089f359
              name: renovate-bot
              command: ["sh", "-c"]
              args:
                - |
                  export RENOVATE_TOKEN=$(cat /tmp/token/token) && renovate
              resources:
                limits:
                  cpu: 1000m
                  memory: 1Gi
                requests:
                  cpu: 250m
                  memory: 512Mi
              securityContext:
                runAsNonRoot: true
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              env:
                - name: RENOVATE_PLATFORM
                  value: "github"
                - name: RENOVATE_AUTODISCOVER
                  value: "false"
                - name: RENOVATE_BASE_DIR
                  value: "/tmp/renovate/"
                - name: RENOVATE_CONFIG_FILE
                  value: "/opt/renovate/config.json"
                - name: RENOVATE_CONFIG_VALIDATION_ERROR
                  value: "true"
                - name: LOG_LEVEL
                  value: debug
                - name: GOFLAGS
                  value: "-mod=mod"
                - name: GOBIN
                  value: /tmp/bin
              volumeMounts:
                - name: token
                  mountPath: /tmp/token
                  readOnly: true
                - name: config-volume
                  mountPath: /opt/renovate/
                - name: work-volume
                  mountPath: /tmp/renovate/
                - name: tmp
                  mountPath: /tmp/
                - name: home
                  mountPath: /home/ubuntu/
                # - name: mod
                #   mountPath: "/usr/local/bin/mod"
                #   subPath: mod
          volumes:
            - name: config-volume
              configMap:
                name: renovate-config
            - name: work-volume
              persistentVolumeClaim:
                claimName: cache
            - name: tmp
              emptyDir:
                sizeLimit: "512Mi"
            - name: home
              emptyDir:
                sizeLimit: "512Mi"
            - name: token
              emptyDir:
                sizeLimit: "1Mi"
