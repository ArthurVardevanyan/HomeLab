---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: zitadel-cnpg
  namespace: zitadel
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/instance: zitadel
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: zitadel
  podMetricsEndpoints:
    - port: metrics
