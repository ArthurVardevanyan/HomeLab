---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-zitadel-app
  namespace: zitadel
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/instance: zitadel
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: zitadel
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: zitadel
          podSelector:
            matchLabels:
              app.kubernetes.io/name: zitadel
      ports:
        - protocol: TCP
          port: 5432
