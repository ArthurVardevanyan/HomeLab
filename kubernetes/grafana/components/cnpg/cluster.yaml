---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/instance: grafana
spec:
  enablePDB: true
  imageName: "ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie@sha256:006b7801eacd9706d6fb557520a414a7d938e4e71333da98695f6f03b20e4cee"
  instances: 2
  imagePullPolicy: IfNotPresent
  logLevel: info
  primaryUpdateMethod: restart
  primaryUpdateStrategy: unsupervised
  startDelay: 3600
  stopDelay: 1800
  smartShutdownTimeout: 180
  switchoverDelay: 3600
  failoverDelay: 0
  minSyncReplicas: 0
  maxSyncReplicas: 0
  postgresUID: 26
  postgresGID: 26
  postgresql:
    parameters:
      shared_buffers: "128MB"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
    pg_hba:
      - "host all all 0.0.0.0/0 trust"
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      postInitSQL:
        - GRANT CREATE ON SCHEMA public TO grafana;
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: false
  storage:
    storageClass: rook-ceph-block
    size: 9Gi
  walStorage:
    storageClass: rook-ceph-block
    size: 3Gi
  resources: # TODO Update Post Metrics
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      cpu: 75m
      memory: 512Mi
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    additionalPodAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                cnpg.io/cluster: grafana
            topologyKey: topology.kubernetes.io/zone
  seccompProfile:
    type: RuntimeDefault
  replicationSlots:
    highAvailability:
      enabled: true
  backup:
    volumeSnapshot:
      className: csi-rbdplugin-snapclass
