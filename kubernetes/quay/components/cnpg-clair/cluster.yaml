---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: clair
  namespace: quay
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/instance: quay
spec:
  enablePDB: true
  imageName: "ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie@sha256:006b7801eacd9706d6fb557520a414a7d938e4e71333da98695f6f03b20e4cee"
  instances: 2
  imagePullPolicy: IfNotPresent
  logLevel: info
  primaryUpdateMethod: restart
  primaryUpdateStrategy: unsupervised
  startDelay: 3600
  stopDelay: 1800
  smartShutdownTimeout: 180
  switchoverDelay: 3600
  failoverDelay: 0
  minSyncReplicas: 0
  maxSyncReplicas: 0
  postgresUID: 26
  postgresGID: 26
  postgresql:
    parameters:
      # Memory - shared_buffers raised to 2GB so Clair's hot working set
      # (vulnerability + manifest tables) fits, dramatically cutting the
      # number of pages dirtied per checkpoint and therefore FPW WAL volume.
      shared_buffers: "2GB"
      effective_cache_size: "3GB"
      work_mem: "64MB"
      maintenance_work_mem: "512MB"
      # WAL / Checkpoint - long checkpoints + max FPW reduction.
      # Clair's WAL is dominated by full_page_writes after every checkpoint,
      # so checkpoint_timeout is the single biggest replication-lag lever.
      wal_buffers: "64MB"
      wal_compression: "lz4"
      max_wal_size: "16GB"
      min_wal_size: "4GB"
      checkpoint_completion_target: "0.9"
      checkpoint_timeout: "30min"
      # Background writer - drain dirty pages between checkpoints so the
      # checkpoint itself writes less and recovery has fewer pages to touch.
      bgwriter_delay: "50ms"
      bgwriter_lru_maxpages: "1000"
      bgwriter_lru_multiplier: "4.0"
      # WAL writer - flush more often so primary doesn't burst-send to replica
      wal_writer_delay: "20ms"
      wal_writer_flush_after: "1MB"
      # synchronous_commit=local: flush WAL locally before ack, but don't wait
      # for replica. "off" was letting the primary outrun the standby.
      # commit_delay removed - it is a no-op when synchronous_commit != on.
      synchronous_commit: "local"
      # Standby WAL apply (single-threaded) - PG 18 prefetch helps on Ceph RBD.
      # wal_decode_buffer_size MUST be large enough for prefetch to see ahead;
      # default 512KB is too small to mask RBD read latency.
      recovery_prefetch: "on"
      wal_decode_buffer_size: "4MB"
      maintenance_io_concurrency: "256"
      hot_standby_feedback: "on"
      # Autovacuum - more aggressive for write-heavy tables
      autovacuum_max_workers: "4"
      autovacuum_naptime: "15s"
      autovacuum_vacuum_scale_factor: "0.05"
      autovacuum_analyze_scale_factor: "0.02"
      autovacuum_vacuum_cost_delay: "2ms"
      # Planner - tuned for SSD (Ceph RBD)
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      # Timeouts - Clair updater/matcher does long batch inserts of CVE data;
      # the previous 5/10 min limits killed legitimate Clair transactions.
      statement_timeout: "0"
      idle_in_transaction_session_timeout: "1800000"
      # Replication - keep enough WAL so a lagging standby is never invalidated
      # (bounded by walStorage size below).
      wal_keep_size: "4GB"
      wal_retrieve_retry_interval: "1s"
      max_slot_wal_keep_size: "16GB"
      # Monitoring
      log_min_duration_statement: "30000"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
    pg_hba:
      - "host all all 0.0.0.0/0 trust"
  bootstrap:
    initdb:
      database: clair
      owner: clair
      postInitSQL:
        - GRANT CREATE ON SCHEMA public TO clair;
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: false
  storage:
    storageClass: rook-ceph-block-ci
    size: 50Gi
  walStorage:
    storageClass: rook-ceph-block-ci
    size: 40Gi
  resources:
    # TODO Update Post Metrics
    requests:
      cpu: 500m
      memory: 2560Mi
    limits:
      cpu: 1500m
      memory: 5Gi
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    additionalPodAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                cnpg.io/cluster: clair
            topologyKey: topology.kubernetes.io/zone
  seccompProfile:
    type: RuntimeDefault
  replicationSlots:
    highAvailability:
      enabled: true
