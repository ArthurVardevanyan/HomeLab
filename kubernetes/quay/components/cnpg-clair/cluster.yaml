---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: clair
  namespace: quay
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/instance: quay
spec:
  # Singleton: Clair's database is fully reproducible by re-running the
  # vulnerability updater, so HA via streaming replication is not worth the
  # Ceph RBD I/O cost. Recovery is via volumeSnapshot + updater re-run.
  enablePDB: false
  imageName: "ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie@sha256:006b7801eacd9706d6fb557520a414a7d938e4e71333da98695f6f03b20e4cee"
  instances: 1
  imagePullPolicy: IfNotPresent
  logLevel: info
  primaryUpdateMethod: restart
  primaryUpdateStrategy: unsupervised
  startDelay: 3600
  stopDelay: 1800
  smartShutdownTimeout: 180
  postgresUID: 26
  postgresGID: 26
  postgresql:
    parameters:
      # Memory - shared_buffers sized so Clair's hot working set fits, which
      # cuts the number of pages dirtied per checkpoint and therefore WAL
      # volume / fsync cost.
      shared_buffers: "2GB"
      effective_cache_size: "3GB"
      work_mem: "64MB"
      maintenance_work_mem: "512MB"
      # WAL / Checkpoint - long checkpoints reduce full-page-write
      # amplification under Clair's write-heavy CVE ingest.
      wal_buffers: "64MB"
      wal_compression: "lz4"
      max_wal_size: "8GB"
      min_wal_size: "2GB"
      checkpoint_completion_target: "0.9"
      checkpoint_timeout: "30min"
      # Background writer - drain dirty pages between checkpoints
      bgwriter_delay: "50ms"
      bgwriter_lru_maxpages: "1000"
      bgwriter_lru_multiplier: "4.0"
      # WAL writer
      wal_writer_delay: "20ms"
      wal_writer_flush_after: "1MB"
      # synchronous_commit=local: flush WAL locally before ack. Singleton
      # has no replica to wait for.
      synchronous_commit: "local"
      # Autovacuum - more aggressive for write-heavy tables
      autovacuum_max_workers: "4"
      autovacuum_naptime: "15s"
      autovacuum_vacuum_scale_factor: "0.05"
      autovacuum_analyze_scale_factor: "0.02"
      autovacuum_vacuum_cost_delay: "2ms"
      # Planner - tuned for SSD (Ceph RBD)
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      # Timeouts - Clair updater/matcher does long batch inserts of CVE data
      statement_timeout: "0"
      idle_in_transaction_session_timeout: "1800000"
      # Monitoring
      log_min_duration_statement: "30000"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
    pg_hba:
      - "host all all 0.0.0.0/0 trust"
  bootstrap:
    initdb:
      database: clair
      owner: clair
      postInitSQL:
        - GRANT CREATE ON SCHEMA public TO clair;
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: false
  storage:
    storageClass: rook-ceph-block-ci
    size: 50Gi
  walStorage:
    storageClass: rook-ceph-block-ci
    size: 40Gi
  resources:
    # TODO Update Post Metrics
    requests:
      cpu: 500m
      memory: 2560Mi
    limits:
      cpu: 1500m
      memory: 5Gi
  # affinity:
  #   enablePodAntiAffinity: true
  #   podAntiAffinityType: required
  #   topologyKey: kubernetes.io/hostname
  #   additionalPodAntiAffinity:
  #     preferredDuringSchedulingIgnoredDuringExecution:
  #       - weight: 100
  #         podAffinityTerm:
  #           labelSelector:
  #             matchLabels:
  #               cnpg.io/cluster: clair
  #           topologyKey: topology.kubernetes.io/zone
  seccompProfile:
    type: RuntimeDefault
