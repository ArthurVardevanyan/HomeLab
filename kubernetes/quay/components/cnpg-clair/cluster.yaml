---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: clair
  namespace: quay
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/instance: quay
spec:
  enablePDB: true
  imageName: "ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie@sha256:51bc94428be3df3e234447278e33803544a93d27a57a4b6af737f218d6472d12"
  instances: 2
  imagePullPolicy: IfNotPresent
  logLevel: info
  primaryUpdateMethod: restart
  primaryUpdateStrategy: unsupervised
  startDelay: 3600
  stopDelay: 1800
  smartShutdownTimeout: 180
  switchoverDelay: 3600
  failoverDelay: 0
  minSyncReplicas: 0
  maxSyncReplicas: 0
  postgresUID: 26
  postgresGID: 26
  postgresql:
    parameters:
      # Memory
      shared_buffers: "512MB"
      effective_cache_size: "3GB"
      work_mem: "32MB"
      maintenance_work_mem: "256MB"
      # WAL / Checkpoint tuning for write-heavy workload
      wal_buffers: "64MB"
      wal_compression: "lz4"
      max_wal_size: "4GB"
      min_wal_size: "1GB"
      checkpoint_completion_target: "0.9"
      checkpoint_timeout: "15min"
      synchronous_commit: "off"
      commit_delay: "100"
      # Autovacuum - more aggressive for write-heavy tables
      autovacuum_max_workers: "4"
      autovacuum_naptime: "15s"
      autovacuum_vacuum_scale_factor: "0.05"
      autovacuum_analyze_scale_factor: "0.02"
      autovacuum_vacuum_cost_delay: "2ms"
      # Planner - tuned for SSD (Ceph RBD)
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      # Timeouts - prevent runaway queries
      statement_timeout: "600000"
      idle_in_transaction_session_timeout: "300000"
      # Replication - help standby keep up
      wal_keep_size: "2GB"
      max_slot_wal_keep_size: "4GB"
      # Monitoring
      log_min_duration_statement: "30000"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
    pg_hba:
      - "host all all 0.0.0.0/0 trust"
  bootstrap:
    initdb:
      database: clair
      owner: clair
      postInitSQL:
        - GRANT CREATE ON SCHEMA public TO clair;
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: false
  storage:
    storageClass: rook-ceph-block-ci
    size: 50Gi
  walStorage:
    storageClass: rook-ceph-block-ci
    size: 20Gi
  resources: # TODO Update Post Metrics
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 1500m
      memory: 4Gi
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    additionalPodAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                cnpg.io/cluster: clair
            topologyKey: topology.kubernetes.io/zone
  seccompProfile:
    type: RuntimeDefault
  replicationSlots:
    highAvailability:
      enabled: true
  backup:
    volumeSnapshot:
      className: csi-rbdplugin-snapclass
