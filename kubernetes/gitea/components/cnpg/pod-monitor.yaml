---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gitea-cnpg
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/instance: gitea
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: gitea
  podMetricsEndpoints:
    - port: metrics
