kind: Service
apiVersion: v1
metadata:
  name: ollama-coder-svc
  namespace: ollama
spec:
  ipFamilies:
    - IPv4
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
  internalTrafficPolicy: Cluster
  type: ClusterIP
  ipFamilyPolicy: SingleStack
  sessionAffinity: None
  selector:
    app: ollama-coder
---
kind: Service
apiVersion: v1
metadata:
  name: ollama-coder-lb
  namespace: ollama
  annotations:
    metallb.io/ip-allocated-from-pool: metallb-pool
    metallb.universe.tf/loadBalancerIPs: 10.101.10.246
spec:
  externalTrafficPolicy: Local
  ipFamilies:
    - IPv4
  ports:
    - name: api
      protocol: TCP
      port: 11434
      targetPort: 11434
      nodePort: 30334
  internalTrafficPolicy: Cluster
  allocateLoadBalancerNodePorts: true
  type: LoadBalancer
  loadBalancerClass: metallb.io/metallb-class
  ipFamilyPolicy: SingleStack
  sessionAffinity: None
  selector:
    app: ollama-coder
