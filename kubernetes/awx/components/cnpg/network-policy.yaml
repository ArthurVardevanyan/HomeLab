---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-awx-app
  namespace: awx
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/instance: awx
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: awx
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: awx
          podSelector:
            matchLabels:
              app.kubernetes.io/managed-by: awx-operator
      ports:
        - protocol: TCP
          port: 5432
---
