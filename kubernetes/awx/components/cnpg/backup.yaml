---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: awx-backup
  namespace: awx
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/instance: awx
spec:
  schedule: "0 2 * * *"
  backupOwnerReference: self
  method: volumeSnapshot
  cluster:
    name: awx
