apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/instance: argocd
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: argocd-server
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: argocd-ca
    hostname: argocd.argocd.svc.cluster.local
