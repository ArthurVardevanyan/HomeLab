---
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: argocd
  namespace: argocd-apps
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  background: false
  rules:
    - name: argocd-scc-override
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              openshift.io/required-scc: restricted-v2
              openshift.io/scc: restricted-v2
    - name: argocd-run-as-user
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      mutate:
        patchesJson6902: |-
          - path: "/spec/template/spec/securityContext/runAsUser"
            op: remove
          - path: "/spec/template/spec/initContainers/0/securityContext/runAsUser"
            op: remove
          - path: "/spec/template/spec/containers/1/securityContext/runAsUser"
            op: remove
          - path: "/spec/template/spec/containers/1/securityContext/runAsUser"
            op: remove
          - path: "/spec/template/spec/securityContext/fsGroup"
            op: remove
          - path: "/spec/template/spec/initContainers/0/securityContext/fsGroup"
            op: remove
          - path: "/spec/template/spec/containers/1/securityContext/fsGroup"
            op: remove
          - path: "/spec/template/spec/containers/1/securityContext/fsGroup"
            op: remove
---
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: copy-tls-to-ca-crt
  namespace: argocd-apps
spec:
  rules:
    - name: argocd-apps-ca-add-ca-crt
      skipBackgroundRequests: true
      match:
        resources:
          kinds:
            - ConfigMap
          name: argocd-apps-ca
      mutate:
        patchStrategicMerge:
          data:
            ca.crt: "{{ request.object.data.\"tls.crt\" }}"
