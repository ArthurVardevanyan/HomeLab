---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosmee
  namespace: openshift-pipelines
  annotations:
    checkov.io/skip1: CKV_K8S_40=OpenShift Injects Random
    checkov.io/skip2: CKV_K8S_8=Probes Don't Exist
    checkov.io/skip3: CKV_K8S_9=Probes Don't Exist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gosmee
  template:
    metadata:
      labels:
        app: gosmee
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
      containers:
        - name: gosmeed
          # renovate: datasource=docker depName=ghcr.io/chmouel/gosmee
          image: ghcr.io/chmouel/gosmee:v0.31.1@sha256:9759c83803d0bb2d8edfc4ed83da74190aabf9b59524abcf0f0739ac601d477d
          imagePullPolicy: IfNotPresent
          args:
            - client
            - "https://hook.pipelinesascode.com/<path:secret/data/homelab/tekton#gosmee_hash>"
            - >-
              https://pipelines-as-code-controller-openshift-pipelines.apps.okd.homelab.arthurvardevanyan.com
          ports:
            - name: http
              containerPort: 3333
              protocol: TCP
          resizePolicy:
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: NotRequired
          resources:
            limits:
              cpu: 20m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      automountServiceAccountToken: false
      enableServiceLinks: false
