    name: netobserv-ebpf-agent
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
      - containerName: netobserv-ebpf-agent
        minAllowed:
          cpu: 10m
          memory: 32Mi
        maxAllowed:
          cpu: 300m
          memory: 512Mi
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsAndLimits
