---
kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: netobserv-plugin-static
  namespace: openshift-netobserv-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  scaleTargetRef:
    kind: Deployment
    name: netobserv-plugin-static
    apiVersion: apps/v1
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 100
---
kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: flowlogs-pipeline
  namespace: openshift-netobserv
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/instance: network-observability
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flowlogs-pipeline
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 90
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
